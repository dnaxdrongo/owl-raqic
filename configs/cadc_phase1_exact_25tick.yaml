world:
  height: 10
  width: 10
  patch_size: 5
  max_steps: 25
  seed: 7071
recording:
  enabled: true
  record_every: 1
  cadc:
    enabled: true
    profile: exact
    capture_agent_context: true
    capture_oracle_context: true
    capture_candidates: true
    capture_execution: true
    capture_events: true
    capture_contributions: true
    capture_information: true
    include_dense_context: true
    exact_local_radius: 1
    device_buffer_slots: 1
    host_queue_depth: 1
    max_device_buffer_bytes: 536870912
    max_pending_bytes: 536870912
    event_capacity_per_tick: 262144
    max_batch_rows: 131072
    max_batch_bytes: 134217728
    parquet_row_group_rows: 131072
    table_flush_ticks: 1
    compression: zstd
    validation: full
    strict_overflow: true
visualization:
  enabled: false
  backend: none
debug:
  assert_invariants: true
raqic:
  enabled: true
  mode: gpu_full
  decision_policy: raqic
  fallback_on_backend_error: true
  full_gpu_strict: false
  full_gpu_transfer_policy: persistent_mirror
  full_gpu_execution_tier: persistent
  full_gpu_precision: audit64
  full_gpu_memory_policy: elastic
  full_gpu_graph_mode: "off"
  full_gpu_stencil_backend: vectorized
  full_gpu_fuse_scatter: true
  full_gpu_phase_mode: canonical_device
  full_gpu_visual_backend: none
  full_gpu_recording_level_v07: metrics_plus_events
